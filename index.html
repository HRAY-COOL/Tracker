<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>X-SYSTEM | SECURE LOGIN</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    :root { --bg: #030305; --accent: #F4320B; --neon: #00f3ff; }
    body, html { margin:0; padding:0; background:var(--bg); color:#fff; font-family: sans-serif; height:100vh; overflow-x:hidden; }
    .container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:20px; text-align:center; }
    .card { background: rgba(15,15,25,0.9); border:1px solid #333; padding:25px; border-radius:8px; width:100%; max-width:400px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .btn-google { background: #fff; color: #000; border:none; padding:12px 20px; border-radius:4px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; margin-top:20px; }
    .btn-track { background: var(--accent); color:#fff; width:100%; padding:12px; border:none; border-radius:4px; margin-top:10px; font-weight:bold; cursor:pointer; }
    #map-box { margin-top:20px; width:100%; border:1px solid var(--accent); display:none; }
    iframe { width:100%; height:300px; border:none; }
    .status { font-size: 0.7rem; color: #888; margin-top: 10px; }
    #userInfo { margin-bottom: 20px; display:none; }
    #userInfo img { width: 50px; border-radius: 50%; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card" id="authCard">
      <h2 style="color:var(--neon)">SECURE_ACCESS</h2>
      <p style="font-size:0.8rem">Please login with Google to synchronize tracking nodes.</p>
      <button class="btn-google" onclick="loginGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Sign in with Google
      </button>
    </div>

    <div class="card" id="trackingCard" style="display:none;">
      <div id="userInfo">
        <img id="userPic" src="">
        <h4 id="userName"></h4>
      </div>
      
      <div id="beaconSection">
        <div style="font-size:1.5rem; font-weight:bold; color:var(--neon); margin:10px 0;" id="myCode">------</div>
        <button class="btn-track" style="background:#0088ff" onclick="activateBeacon()">ACTIVATE_BEACON</button>
      </div>

      <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

      <div id="monitorSection">
        <input type="text" id="targetID" placeholder="ENTER_TARGET_CODE" style="width:100%; padding:10px; background:#000; border:1px solid #444; color:#fff; margin-bottom:10px;">
        <button class="btn-track" onclick="startTracking()">DECRYPT_LOCATION</button>
        <div id="map-box">
          <iframe id="mFrame" src=""></iframe>
          <div id="coords" style="font-size:0.6rem; background:#111; padding:5px; color:var(--neon)"></div>
        </div>
      </div>
      <p id="log" class="status">> System Idle...</p>
    </div>
  </div>

<script>
  // --- KONFIGURASI FIREBASE LU (PASTIIN BENER!) ---
  const firebaseConfig = {
    apiKey: "AIzaSyDEQPbyTMnAv5wKmPzSkoUxxt-troi1Zy4",
    authDomain: "my-lacak.firebaseapp.com",
    projectId: "my-lacak",
    storageBucket: "my-lacak.firebasestorage.app",
    messagingSenderId: "629191404429",
    appId: "1:629191404429:web:b20db7a5455dd99a2f2bc4"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // 1. LOGIN GOOGLE (ASLI)
  function loginGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then((result) => {
      showApp(result.user);
    }).catch((error) => {
      alert("Login Failed: " + error.message);
    });
  }

  function showApp(user) {
    document.getElementById('authCard').style.display = 'none';
    document.getElementById('trackingCard').style.display = 'block';
    document.getElementById('userInfo').style.display = 'block';
    document.getElementById('userPic').src = user.photoURL;
    document.getElementById('userName').innerText = user.displayName;
  }

  // 2. ACTIVATE BEACON (KIRIM LOKASI)
  function activateBeacon() {
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('myCode').innerText = code;
    document.getElementById('log').innerText = "> SATELLITE_UPLINK_ACTIVE";

    navigator.geolocation.watchPosition((p) => {
      db.ref('targets/' + code).set({
        lat: p.coords.latitude,
        lng: p.coords.longitude,
        name: auth.currentUser.displayName,
        upd: Date.now()
      });
    }, (err) => { alert("Please Allow Location!"); }, {enableHighAccuracy: true});
  }

  // 3. START TRACKING (LIAT PETA TARGET)
  function startTracking() {
    const target = document.getElementById('targetID').value.toUpperCase();
    if(!target) return;

    document.getElementById('log').innerText = "> INTERCEPTING_SIGNAL...";
    
    db.ref('targets/' + target).on('value', (snap) => {
      const data = snap.val();
      if(data) {
        document.getElementById('map-box').style.display = 'block';
        // PAKE HTTPS BIAR GAK DI-BLOCK BROWSER
        document.getElementById('mFrame').src = `https://maps.google.com/maps?q=${data.lat},${data.lng}&z=16&output=embed`;
        document.getElementById('coords').innerText = `Target: ${data.name} | Coords: ${data.lat}, ${data.lng}`;
        document.getElementById('log').innerText = "> LOCK_SUCCESS";
      } else {
        alert("SIGNAL_NOT_FOUND");
      }
    });
  }
</script>
</body>
</html>
